<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JLI Declutter Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header>
        <h1>JLI Declutter Settings</h1>
        <p>Choose which LinkedIn clutter cleanup rules run locally in your browser.</p>
      </header>

      <section class="settings-section">
        <div class="section-heading">
          <h2>Features</h2>
          <p>JLI Declutter only changes your local LinkedIn page view. It does not use LinkedIn APIs or send data anywhere.</p>
        </div>
        <fieldset class="feature-toggles">
          <legend>Enabled features</legend>
          <label><input id="feature-clean-feed" type="checkbox"> Clean feed clutter</label>
          <label><input id="feature-collapse-notifications" type="checkbox"> Collapse notification clutter</label>
        </fieldset>
      </section>

      <div class="actions">
        <button id="save" type="button">Save</button>
      </div>

      <p id="status" role="status"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
