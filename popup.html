<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JLI TODOs</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>TODOs</h1>
          <p id="summary">Loading...</p>
        </div>
        <button id="clear-all" type="button">Clear all</button>
      </header>

      <section class="filters" aria-label="TODO filters">
        <div class="tabs" role="tablist" aria-label="TODO status">
          <button id="active-tab" type="button" role="tab" aria-selected="true" data-tab="active">Active</button>
          <button id="completed-tab" type="button" role="tab" aria-selected="false" data-tab="completed">Completed</button>
        </div>
        <label>
          Search
          <input id="search" type="search" placeholder="Name or message text">
        </label>
        <label>
          Type
          <select id="type-filter">
            <option value="all">All types</option>
          </select>
        </label>
        <label>
          Person
          <select id="person-filter">
            <option value="all">All people</option>
          </select>
        </label>
      </section>

      <section id="todos" aria-live="polite"></section>
    </main>

    <template id="todo-template">
      <article class="todo-card">
        <div class="todo-heading">
          <strong class="todo-title"></strong>
          <span class="todo-source"></span>
        </div>
        <p class="todo-meta"></p>
        <p class="todo-preview"></p>
        <div class="todo-actions">
          <a class="todo-open" target="_blank" rel="noreferrer">Open</a>
          <a class="todo-profile" target="_blank" rel="noreferrer">Profile</a>
          <button class="todo-copy" type="button">Copy message</button>
          <button class="todo-messaged" type="button" data-status="messaged">Mark messaged</button>
          <button type="button" data-status="need-reply">Need reply</button>
          <button type="button" data-status="done">Done</button>
          <button type="button" data-status="dismissed">Dismiss</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
